name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vet-build:
    name: vet + build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: go vet
        run: go vet ./...
      - name: go build
        run: go build -o /dev/null ./...

  cross-build:
    name: cross-compile (darwin/arm64, linux/amd64, linux/arm64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: make build
        run: make build
      - name: list built binaries
        run: ls -la bin/
