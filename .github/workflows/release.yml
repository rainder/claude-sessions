name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true

      - name: build all archs
        run: make build

      - name: generate sha256 checksums
        run: |
          cd bin
          sha256sum claude-sessions-* > SHA256SUMS
          cat SHA256SUMS

      - name: extract release notes from CHANGELOG
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # Pull the section under "## [<TAG>]" up to the next "## " heading.
          awk -v ver="[$TAG]" '
            /^## / {
              if (in_section) exit
              if (index($0, ver) > 0) { in_section=1; next }
            }
            in_section
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "(no CHANGELOG entry for $TAG)" > release-notes.md
          fi
          echo "--- release notes ---"
          cat release-notes.md

      - name: create github release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file release-notes.md \
            bin/claude-sessions-* bin/SHA256SUMS
